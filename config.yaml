dataset:
  root: /pool1/home/ysxin/E3nnVB/VB
  task: regression

training:
  seed: 0
  device: cuda
  num_workers: 0
  batch_size: 16
  epochs: 50
  lr: 1e-3
  weight_decay: 1e-5

  loss: mse
  # 学习率调控器
  scheduler: 
    name: reduce_on_plateau
    mode: min
    factor: 0.5
    patience: 10
    min_lr: 1e-6

model:
  # --- irreps --- 
  irreps_in: "3x0e"
  hidden_irreps: "32x0e + 16x1o + 8x2e"
  irreps_out: "1x0e"
  # lap_pe_dim: 6 

  # ---geometry---
  lmax_attr: 2 # 二阶球谐函数
  edge_scalar_dim: 3
  use_r2: true

  # ---network---
  layers: 4
  norm: "batch"
  pool: "mean"